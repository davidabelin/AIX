<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}AIX{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Baskervville:ital@0;1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/hub_theme.css') }}">
  </head>
  <body>
    <div class="bg-orb bg-orb-a"></div>
    <div class="bg-orb bg-orb-b"></div>
    <header class="site-header">
      <a class="brand" href="{{ url_for('hub.home') }}">AIX</a>
      <nav class="site-nav">
        <a href="{{ url_for('hub.home') }}">Hub</a>
        {% for mount in hub_nav_mounts %}
        <a href="/{{ mount.spec.slug }}/">{{ mount.spec.display_name }}</a>
        {% endfor %}
      </nav>
    </header>
    <main class="page">
      {% block content %}{% endblock %}
    </main>
    <footer class="site-footer">
      <div class="footer-inner">
        <p class="footer-copy aix-footer-copy">
          <img class="copyleft-mark" src="{{ url_for('static', filename='icons/copyleft.svg') }}" alt="" aria-hidden="true">
          <span>2026 AIX Protodyne</span>
        </p>
        <nav class="footer-links" aria-label="AIX footer">
          <a href="{{ url_for('hub.contact_page') }}">Contact Us</a>
          <a href="{{ url_for('hub.privacy_page') }}">Privacy</a>
          <a href="{{ url_for('hub.toc_page') }}">AIX TOC</a>
        </nav>
      </div>
    </footer>
  </body>
</html>
